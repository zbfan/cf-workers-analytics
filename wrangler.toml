name = "cf-workers-analytics"
main = "src/index.js"
compatibility_date = "2024-03-01"

# D1 Database for persistent analytics storage
[[d1_databases]]
binding = "DB"
database_name = "analytics-db"
database_id = ""

# KV Namespace for caching IP geolocation data
[[kv_namespaces]]
binding = "GEO_CACHE"
id = ""
preview_id = ""

# Environment variables
[vars]
VERSION = "1.0.0"
SITE_URL = "https://analytics.yourdomain.com"

[site]
bucket = "./dist"

# Routes
routes = [
  { pattern = "analytics.yourdomain.com", zone_name = "yourdomain.com" }
]