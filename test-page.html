<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HanAnalytics 压力测试工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#0f172a;color:#e2e8f0;line-height:1.6}
.container{max-width:1000px;margin:0 auto;padding:16px}
h1{font-size:24px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.sub{color:#94a3b8;font-size:13px;margin-bottom:20px}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;margin-bottom:16px}
.card h2{font-size:16px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card h2 .badge{font-size:11px;background:#6366f1;padding:2px 8px;border-radius:10px;font-weight:400}
label{display:block;font-size:13px;color:#94a3b8;margin-bottom:4px}
input,select,textarea{width:100%;padding:10px 14px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:14px;font-family:inherit;transition:border-color .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:#6366f1}
textarea{font-family:'Courier New',monospace;font-size:13px;min-height:100px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{margin-bottom:12px}
.btn{padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px;font-weight:500}
.btn-primary{background:#6366f1;color:white}.btn-primary:hover{background:#4f46e5}
.btn-success{background:#22c55e;color:white}.btn-success:hover{background:#16a34a}
.btn-danger{background:#ef4444;color:white}.btn-danger:hover{background:#dc2626}
.btn-warning{background:#f59e0b;color:white}.btn-warning:hover{background:#d97706}
.btn-outline{background:transparent;border:1px solid #334155;color:#94a3b8}.btn-outline:hover{border-color:#6366f1;color:#6366f1}
.btn:disabled{opacity:.5;cursor:not-allowed}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}

/* Status Bar */
.status-bar{display:flex;gap:16px;flex-wrap:wrap;padding:12px 16px;background:#0f172a;border-radius:8px;margin-bottom:12px}
.status-item{display:flex;align-items:center;gap:6px;font-size:13px}
.status-dot{width:8px;height:8px;border-radius:50%}
.dot-ok{background:#22c55e}.dot-err{background:#ef4444}.dot-pending{background:#f59e0b}.dot-idle{background:#64748b}

/* Progress */
.progress-wrap{background:#0f172a;border-radius:8px;height:8px;overflow:hidden;margin:12px 0}
.progress-bar{height:100%;background:linear-gradient(90deg,#6366f1,#818cf8);border-radius:8px;transition:width .3s ease;width:0%}

/* Log */
.log-container{background:#0f172a;border:1px solid #334155;border-radius:8px;max-height:400px;overflow-y:auto;font-family:'Courier New',monospace;font-size:12px;padding:12px;margin-top:12px}
.log-entry{padding:4px 0;border-bottom:1px solid rgba(51,65,85,.3);display:flex;gap:8px}
.log-entry:last-child{border-bottom:none}
.log-time{color:#64748b;white-space:nowrap;min-width:80px}
.log-ok{color:#22c55e}.log-err{color:#ef4444}.log-info{color:#94a3b8}

/* Stats Grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:12px}
.stat-box{background:#0f172a;border-radius:8px;padding:14px;text-align:center}
.stat-box .num{font-size:24px;font-weight:700}
.stat-box .lbl{font-size:11px;color:#64748b;margin-top:2px}
.stat-box.green .num{color:#22c55e}
.stat-box.red .num{color:#ef4444}
.stat-box.blue .num{color:#6366f1}
.stat-box.yellow .num{color:#f59e0b}

/* User Agent Presets */
.ua-presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.ua-preset{padding:4px 10px;background:#0f172a;border:1px solid #334155;border-radius:6px;font-size:11px;cursor:pointer;transition:all .2s}
.ua-preset:hover{border-color:#6366f1;color:#6366f1}
.ua-preset.active{background:#6366f1;border-color:#6366f1;color:white}

@media(max-width:640px){.form-row{grid-template-columns:1fr}.container{padding:12px}.stats-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="container">
  <h1>&#x1f4ca; HanAnalytics &#x1f4a5; 压力测试工具</h1>
  <p class="sub">向您的分析服务发送测试请求，验证追踪、数据采集和仪表板功能</p>

  <!-- Status -->
  <div class="card" style="padding:16px;">
    <div class="status-bar" id="statusBar">
      <div class="status-item"><span class="status-dot dot-idle" id="statusDot"></span><span id="statusText">就绪</span></div>
      <div class="status-item">&#x1f310; 目标: <strong id="targetUrl">-</strong></div>
      <div class="status-item">&#x23f3; 耗时: <strong id="elapsedTime">0s</strong></div>
    </div>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
  </div>

  <!-- Configuration -->
  <div class="card">
    <h2>&#x2699; 测试配置</h2>
    <div class="form-row">
      <div class="form-group">
        <label>分析服务 URL</label>
        <input type="url" id="serverUrl" value="https://cf-workers-analytics.zbfan.workers.dev" placeholder="https://your-worker.workers.dev">
      </div>
      <div class="form-group">
        <label>网站 ID (data-website-id)</label>
        <input type="text" id="websiteId" value="test-site" placeholder="自定义站点标识">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>请求数量</label>
        <input type="number" id="requestCount" value="10" min="1" max="10000" placeholder="每次发送数量">
      </div>
      <div class="form-group">
        <label>并发数</label>
        <input type="number" id="concurrency" value="5" min="1" max="50" placeholder="同时发送请求数">
      </div>
    </div>
    <div class="form-group">
      <label>User-Agent 预设</label>
      <div class="ua-presets" id="uaPresets">
        <span class="ua-preset active" data-ua="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36">Chrome Win</span>
        <span class="ua-preset" data-ua="Mozilla/5.0 (Macintosh; Intel Mac OS X 14_5) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.5 Safari/605.1.15">Safari Mac</span>
        <span class="ua-preset" data-ua="Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:127.0) Gecko/20100101 Firefox/127.0">Firefox Win</span>
        <span class="ua-preset" data-ua="Mozilla/5.0 (iPhone; CPU iPhone OS 17_5 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.5 Mobile/15E148 Safari/604.1">iPhone Safari</span>
        <span class="ua-preset" data-ua="Mozilla/5.0 (Linux; Android 14; SM-S928B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.6422.113 Mobile Safari/537.36">Android Chrome</span>
        <span class="ua-preset" data-ua="Mozilla/5.0 (iPad; CPU OS 17_5 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.5 Mobile/15E148 Safari/604.1">iPad</span>
        <span class="ua-preset" data-ua="Mozilla/5.0 (Linux; Android 14; Pixel 9 Pro) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.6422.113 Mobile Safari/537.36">Pixel Android</span>
      </div>
      <textarea id="userAgent" rows="3" placeholder="自定义 User-Agent 字符串">Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36</textarea>
    </div>
    <div class="actions">
      <button class="btn btn-primary" id="btnTrack" onclick="startTrackTest()">&#x1f4e1; 发送追踪请求</button>
      <button class="btn btn-warning" id="btnBatch" onclick="startBatchTest()">&#x1f4a5; 批量压测</button>
      <button class="btn btn-success" id="btnApiCheck" onclick="checkApi()">&#x2705; 检查 API</button>
      <button class="btn btn-outline" onclick="clearLog()">&#x1f5d1; 清空日志</button>
      <button class="btn btn-outline" onclick="stopTest()" id="btnStop" disabled>&#x23f9; 停止</button>
    </div>
  </div>

  <!-- Results -->
  <div class="card">
    <h2>&#x1f4ca; 测试结果 <span class="badge" id="resultBadge">等待测试</span></h2>
    <div class="stats-grid" id="statsGrid">
      <div class="stat-box blue"><div class="num" id="statTotal">0</div><div class="lbl">总请求</div></div>
      <div class="stat-box green"><div class="num" id="statSuccess">0</div><div class="lbl">成功 (2xx)</div></div>
      <div class="stat-box red"><div class="num" id="statError">0</div><div class="lbl">失败</div></div>
      <div class="stat-box yellow"><div class="num" id="statNon200">0</div><div class="lbl">非200</div></div>
    </div>
    <div class="log-container" id="logContainer">
      <div class="log-entry"><span class="log-time">就绪</span><span class="log-info">配置目标 URL 后点击测试按钮开始</span></div>
    </div>
  </div>

  <!-- Embed Code -->
  <div class="card" style="text-align:center;font-size:12px;color:#64748b;">
    <p>HanAnalytics Test Tool v1.0 &middot; Powered by Cloudflare Workers</p>
  </div>
</div>

<script>
let isRunning = false;
let shouldStop = false;
let totalSent = 0, totalSuccess = 0, totalError = 0, totalNon200 = 0;

// User Agent presets
document.querySelectorAll('.ua-preset').forEach(el => {
  el.addEventListener('click', function() {
    document.querySelectorAll('.ua-preset').forEach(e => e.classList.remove('active'));
    this.classList.add('active');
    document.getElementById('userAgent').value = this.dataset.ua;
  });
});

function setStatus(text, type) {
  document.getElementById('statusText').textContent = text;
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot dot-' + (type || 'idle');
}

function updateStats() {
  document.getElementById('statTotal').textContent = totalSent;
  document.getElementById('statSuccess').textContent = totalSuccess;
  document.getElementById('statError').textContent = totalError;
  document.getElementById('statNon200').textContent = totalNon200;
  document.getElementById('resultBadge').textContent = totalSent + ' 请求 | ' + totalSuccess + ' 成功';
}

function addLog(time, text, type) {
  const container = document.getElementById('logContainer');
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = '<span class="log-time">' + time + '</span><span class="log-' + (type || 'info') + '">' + text + '</span>';
  container.appendChild(entry);
  container.scrollTop = container.scrollHeight;
}

function clearLog() {
  const container = document.getElementById('logContainer');
  container.innerHTML = '';
  totalSent = totalSuccess = totalError = totalNon200 = 0;
  updateStats();
  document.getElementById('progressBar').style.width = '0%';
  addLog(getTime(), '日志已清空', 'info');
}

function getTime() {
  return new Date().toLocaleTimeString('zh-CN', { hour12: false });
}

function getServerUrl() {
  return document.getElementById('serverUrl').value.trim().replace(/\/$/, '');
}

// Send single track request
async function sendTrackRequest(url, websiteId, ua) {
  const data = {
    website_id: websiteId,
    url: 'https://test-page.com/' + Math.random().toString(36).substring(2, 8),
    referrer: document.referrer || '',
    screen_size: '1920x1080',
    lang: 'zh-CN',
    user_agent: ua,
    timestamp: Date.now()
  };

  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 10000);

  try {
    const res = await fetch(url + '/track', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
      signal: controller.signal
    });
    clearTimeout(timeout);
    const text = await res.text();
    return { status: res.status, ok: res.ok, body: text };
  } catch (err) {
    clearTimeout(timeout);
    return { status: 0, ok: false, body: err.message };
  }
}

// Start single track test
async function startTrackTest() {
  if (isRunning) return;
  const url = getServerUrl();
  if (!url) { alert('请输入分析服务 URL'); return; }

  const websiteId = document.getElementById('websiteId').value || 'test-site';
  const ua = document.getElementById('userAgent').value;

  document.getElementById('targetUrl').textContent = url;
  setStatus('发送中...', 'pending');
  isRunning = true;

  const result = await sendTrackRequest(url, websiteId, ua);
  totalSent++;
  if (result.ok && result.status === 200) {
    totalSuccess++;
    addLog(getTime(), '&#x2705; [' + result.status + '] 追踪成功 | ' + (result.body || ''), 'ok');
  } else if (result.status > 0) {
    totalNon200++;
    addLog(getTime(), '&#x26a0; [' + result.status + '] ' + (result.body || ''), 'err');
  } else {
    totalError++;
    addLog(getTime(), '&#x274c; 连接失败: ' + (result.body || ''), 'err');
  }
  updateStats();
  setStatus('完成', 'ok');
  isRunning = false;
}

// Batch test
async function startBatchTest() {
  if (isRunning) { stopTest(); return; }

  const url = getServerUrl();
  if (!url) { alert('请输入分析服务 URL'); return; }

  const count = parseInt(document.getElementById('requestCount').value) || 10;
  const concurrency = parseInt(document.getElementById('concurrency').value) || 5;
  const websiteId = document.getElementById('websiteId').value || 'test-site';

  // Random UA list for realistic testing
  const uaList = Array.from(document.querySelectorAll('.ua-preset')).map(el => el.dataset.ua);

  shouldStop = false;
  isRunning = true;
  totalSent = totalSuccess = totalError = totalNon200 = 0;
  updateStats();
  clearLog();

  document.getElementById('btnTrack').disabled = true;
  document.getElementById('btnBatch').disabled = true;
  document.getElementById('btnApiCheck').disabled = true;
  document.getElementById('btnStop').disabled = false;
  document.getElementById('targetUrl').textContent = url;

  setStatus('批量测试中: ' + count + ' 请求, ' + concurrency + ' 并发...', 'pending');
  addLog(getTime(), '&#x1f680; 开始批量测试: ' + count + ' 请求, ' + concurrency + ' 并发', 'info');

  const startTime = Date.now();
  const pb = document.getElementById('progressBar');
  const elapsedEl = document.getElementById('elapsedTime');

  // Process in batches
  let completed = 0;
  const uaPresets = ['Chrome Win', 'Safari Mac', 'Firefox Win', 'iPhone Safari', 'Android Chrome', 'iPad', 'Pixel Android'];
  const urls = [
    'https://example.com',
    'https://blog.example.com',
    'https://shop.example.com/products/123',
    'https://docs.example.com/guide',
    'https://example.com/about'
  ];

  while (completed < count && !shouldStop) {
    const batchSize = Math.min(concurrency, count - completed);
    const batch = [];

    for (let i = 0; i < batchSize; i++) {
      const idx = completed + i;
      const ua = uaList[idx % uaList.length];
      const randomUrl = urls[idx % urls.length] + '?t=' + idx;
      batch.push(sendTrackRequest(url, websiteId, ua));
    }

    const results = await Promise.all(batch);
    results.forEach((result, i) => {
      totalSent++;
      if (result.ok && result.status === 200) {
        totalSuccess++;
        if (totalSent <= 10 || totalSent % 10 === 0) {
          const uaName = uaPresets[(completed + i) % uaPresets.length];
          addLog(getTime(), '&#x2705; [200] ' + uaName + ' | id: ' + (result.body || '').substring(0, 30), 'ok');
        }
      } else if (result.status > 0) {
        totalNon200++;
        addLog(getTime(), '&#x26a0; [' + result.status + '] ' + (result.body || '').substring(0, 50), 'err');
      } else {
        totalError++;
        addLog(getTime(), '&#x274c; 连接失败: ' + (result.body || '').substring(0, 50), 'err');
      }
    });

    completed += batchSize;
    const pct = Math.round((completed / count) * 100);
    pb.style.width = pct + '%';
    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    elapsedEl.textContent = elapsed + 's';
    updateStats();
    setStatus('进行中: ' + completed + '/' + count, 'pending');
  }

  const totalTime = ((Date.now() - startTime) / 1000).toFixed(1);
  elapsedEl.textContent = totalTime + 's';
  pb.style.width = '100%';

  document.getElementById('btnTrack').disabled = false;
  document.getElementById('btnBatch').disabled = false;
  document.getElementById('btnApiCheck').disabled = false;
  document.getElementById('btnStop').disabled = true;

  if (shouldStop) {
    setStatus('已停止', 'pending');
    addLog(getTime(), '&#x23f9; 测试已手动停止', 'err');
  } else {
    setStatus('全部完成', 'ok');
    addLog(getTime(), '&#x2705; 批量测试完成! ' + totalSuccess + '/' + totalSent + ' 成功, 耗时 ' + totalTime + 's', 'ok');
  }

  isRunning = false;
  shouldStop = false;
}

function stopTest() {
  shouldStop = true;
  document.getElementById('btnStop').disabled = true;
  addLog(getTime(), '&#x23f9; 正在停止...', 'err');
}

// API Check
async function checkApi() {
  if (isRunning) return;
  const url = getServerUrl();
  if (!url) { alert('请输入分析服务 URL'); return; }

  isRunning = true;
  setStatus('检查 API...', 'pending');
  addLog(getTime(), '&#x1f50d; 开始检查 API 端点', 'info');

  const endpoints = [
    { path: '/api/version', name: '版本信息' },
    { path: '/api/overview', name: '流量概览' },
    { path: '/api/timeseries?period=24h', name: '时间序列' },
    { path: '/api/browsers?period=24h', name: '浏览器分布' },
    { path: '/api/countries?period=24h', name: '国家分布' },
    { path: '/api/os?period=24h', name: '操作系统' },
    { path: '/api/devices?period=24h', name: '设备分布' },
    { path: '/api/recent', name: '最近访问' },
    { path: '/api/sites', name: '站点列表' },
  ];

  for (const ep of endpoints) {
    try {
      const res = await fetch(url + ep.path);
      const text = await res.text();
      if (res.ok) {
        totalSuccess++;
        const summary = text.substring(0, 80);
        addLog(getTime(), '&#x2705; [' + res.status + '] ' + ep.name + ' | ' + summary, 'ok');
      } else {
        totalNon200++;
        addLog(getTime(), '&#x26a0; [' + res.status + '] ' + ep.name + ' | ' + text.substring(0, 60), 'err');
      }
    } catch (err) {
      totalError++;
      addLog(getTime(), '&#x274c; ' + ep.name + ' 连接失败: ' + err.message, 'err');
    }
    totalSent++;
    updateStats();
  }

  setStatus('API 检查完成', 'ok');
  addLog(getTime(), '&#x2705; API 检查完成', 'ok');
  isRunning = false;
}

// Init
document.getElementById('targetUrl').textContent = getServerUrl() || '-';
</script>
</body>
</html>
